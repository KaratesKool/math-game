<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 Singapore Landmarks Math Puzzle</title>
    <style>
        :root {
            --primary-color: #d9381e; /* Singapore Crimson Red */
            --bg-color: #f5f6fa;
            --text-color: #2f3542;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary-color);
            margin: 10px 0 5px 0;
            font-size: 1.8rem;
            text-align: center;
        }

        p {
            margin: 0 0 20px 0;
            font-size: 1rem;
            color: #57606f;
            text-align: center;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 450px;
        }

        /* Responsive Square Grid Box */
        #puzzle-board {
            width: 100%;
            aspect-ratio: 1 / 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            border: 4px solid #2f3542;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            position: relative;
            background-image: url('https://images.unsplash.com/photo-1525625293386-3f8f99389edd?auto=format&fit=crop&w=600&q=80'); /* Marina Bay Sands */
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .tile {
            background-color: var(--primary-color);
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            user-select: none;
        }

        .tile:hover {
            background-color: #b82e18;
        }

        .tile.selected {
            background-color: #a02612;
            box-shadow: inset 0 0 0 4px #ffeb3b;
        }

        .tile.revealed {
            background-color: transparent !important;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
            color: transparent;
        }

        /* Math Question Box */
        #question-box {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        #question-text {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        #answer-input {
            width: 80%;
            padding: 12px;
            font-size: 1.2rem;
            text-align: center;
            border: 2px solid #ced6e0;
            border-radius: 6px;
            margin-bottom: 15px;
            outline: none;
            -moz-appearance: textfield;
        }

        #answer-input:focus {
            border-color: var(--primary-color);
        }

        #submit-btn {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 80%;
            transition: background-color 0.2s;
        }

        #submit-btn:hover {
            background-color: #26af5f;
        }

        #feedback {
            margin-top: 12px;
            font-weight: bold;
            font-size: 1.05rem;
            min-height: 22px;
        }

        #win-message {
            display: none;
            font-size: 1.4rem;
            color: #2ed573;
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <h1>Singapore Landmarks Math Puzzle!</h1>
    <p>Solve the decimal addition problems to reveal a famous place of interest!</p>

    <div id="game-container">
        <!-- 3x3 Puzzle Board -->
        <div id="puzzle-board">
            <div class="tile" data-index="0">1</div>
            <div class="tile" data-index="1">2</div>
            <div class="tile" data-index="2">3</div>
            <div class="tile" data-index="3">4</div>
            <div class="tile" data-index="4">5</div>
            <div class="tile" data-index="5">6</div>
            <div class="tile" data-index="6">7</div>
            <div class="tile" data-index="7">8</div>
            <div class="tile" data-index="8">9</div>
        </div>

        <!-- Math Question Panel -->
        <div id="question-box">
            <div id="question-text">Select a tile!</div>
            <input type="number" id="answer-input" step="0.01" placeholder="Your decimal answer" autocomplete="off">
            <button id="submit-btn">Submit</button>
            <div id="feedback"></div>
        </div>

        <div id="win-message">🎉 Well done! You revealed the stunning Marina Bay Sands in Singapore! 🇸🇬 🎉</div>
    </div>

    <script>
        // Preset Fixed Math Problems Linked directly to numbers 1-9
        const puzzleQuestions = [
            { q: "9.4 + 1.4", a: 10.8 },
            { q: "3.25 + 2.5", a: 5.75 },
            { q: "12.7 + 4.15", a: 16.85 },
            { q: "0.65 + 0.35", a: 1.0 },
            { q: "5.8 + 7.4", a: 13.2 },
            { q: "8.12 + 1.18", a: 9.3 },
            { q: "4.7 + 3.9", a: 8.6 },
            { q: "15.35 + 6.25", a: 21.6 },
            { q: "0.09 + 1.41", a: 1.5 }
        ];

        const tiles = document.querySelectorAll('.tile');
        const questionBox = document.getElementById('question-box');
        const questionText = document.getElementById('question-text');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const feedback = document.getElementById('feedback');
        const winMessage = document.getElementById('win-message');

        let currentTileIndex = null;
        let revealedCount = 0;

        // Assign click handlers to all tiles
        tiles.forEach(tile => {
            tile.addEventListener('click', () => {
                const index = parseInt(tile.dataset.index);
                
                // Clear out active selections
                tiles.forEach(t => t.classList.remove('selected'));
                
                currentTileIndex = index;
                tile.classList.add('selected');

                // Display targeted problem
                feedback.innerText = '';
                answerInput.value = '';
                questionText.innerText = `Square ${index + 1}: What is ${puzzleQuestions[index].q}?`;
                questionBox.style.display = 'block';
                answerInput.focus();
            });
        });

        // Answer checking function
        function checkAnswer() {
            if (currentTileIndex === null) return;

            const studentAnswer = parseFloat(answerInput.value);
            const correctAnswer = puzzleQuestions[currentTileIndex].a;

            if (isNaN(studentAnswer)) {
                feedback.style.color = '#ffa502';
                feedback.innerText = 'Please type a valid answer!';
                return;
            }

            // Margin of error compensation for javascript floating point quirks
            if (Math.abs(studentAnswer - correctAnswer) < 0.01) {
                feedback.style.color = '#2ed573';
                feedback.innerText = 'Correct!';
                
                // Reveal tile section
                const activeTile = tiles[currentTileIndex];
                activeTile.classList.remove('selected');
                activeTile.classList.add('revealed');
                
                questionBox.style.display = 'none';
                currentTileIndex = null;
                revealedCount++;

                if (revealedCount === 9) {
                    winMessage.style.display = 'block';
                }
            } else {
                feedback.style.color = '#ff4757';
                feedback.innerText = 'Not quite! Try adding again.';
                answerInput.value = '';
                answerInput.focus();
            }
        }

        submitBtn.addEventListener('click', checkAnswer);
        
        answerInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
