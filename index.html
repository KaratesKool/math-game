<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 Singapore Landmarks Math Puzzle</title>
    <style>
        :root {
            --grid-size: 450px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            color: #c0392b; /* Vibrant crimson accent inspired by Singapore's colors */
            margin-bottom: 10px;
        }

        p {
            color: #57606f;
            margin-top: 0;
            font-size: 16px;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* The Puzzle Board */
        #puzzle-board {
            width: var(--grid-size);
            height: var(--grid-size);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            border: 4px solid #2f3542;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.19);
            position: relative;
            /* Singapore Landmark Background: Marina Bay Sands */
            background-image: url('https://encrypted-tbn0.gstatic.com/licensed-image?q=tbn:ANd9GcQD8peKRTm_LKvznWPOKjDJTwNK1EuB2SfuBWkrpR9SRXbvh3iMXW5oOghDhds-0FgoBVWf_VlVskjxvkU');
            background-size: cover;
            background-position: center;
        }

        /* Individual grid covers */
        .tile {
            background-color: #e74c3c; /* Bright red matching the theme */
            border: 1px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            user-select: none;
        }

        .tile:hover {
            background-color: #c0392b;
        }

        /* When solved, the cover disappears to show the background */
        .tile.revealed {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none; 
            color: transparent;
        }

        /* Math Question Modal Panel */
        #question-box {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 320px;
        }

        #question-text {
            font-size: 20px;
            margin-bottom: 15px;
            color: #2f3542;
        }

        #answer-input {
            width: 80%;
            padding: 10px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #ced6e0;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        #answer-input:focus {
            outline: none;
            border-color: #e74c3c;
        }

        #submit-btn {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 87%;
        }

        #submit-btn:hover {
            background-color: #26af5f;
        }

        #feedback {
            margin-top: 10px;
            font-weight: bold;
            min-height: 20px;
        }

        #win-message {
            display: none;
            font-size: 22px;
            color: #2ed573;
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
            max-width: 450px;
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <h1>Singapore Landmarks Math Puzzle!</h1>
    <p>Solve the decimal addition problems to reveal a famous place of interest!</p>

    <div id="game-container">
        <div id="puzzle-board">
            <!-- 9 Tiles generated dynamically by JS -->
        <div class="tile" data-index="1">1</div><div class="tile" data-index="2">2</div><div class="tile" data-index="3">3</div><div class="tile" data-index="4">4</div><div class="tile revealed" data-index="5">5</div><div class="tile" data-index="6">6</div><div class="tile" data-index="7">7</div><div class="tile" data-index="8">8</div><div class="tile" data-index="9">9</div></div>

        <div id="question-box" style="display: none;">
            <div id="question-text">Square 5: What is 2.4 + 7.6?</div>
            <input type="number" id="answer-input" step="0.1" placeholder="Your decimal answer" autocomplete="off">
            <button id="submit-btn">Submit</button>
            <div id="feedback" style="color: rgb(46, 213, 115);">Correct!</div>
        </div>

        <div id="win-message">🎉 Well done! You revealed the stunning Marina Bay Sands in Singapore! 🇸🇬 🎉</div>
    </div>

    <script>
        const puzzleBoard = document.getElementById('puzzle-board');
        const questionBox = document.getElementById('question-box');
        const questionText = document.getElementById('question-text');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const feedback = document.getElementById('feedback');
        const winMessage = document.getElementById('win-message');

        let currentTile = null;
        let correctAnswer = 0;
        let revealedCount = 0;

        // Initialize the 3x3 Grid
        for (let i = 1; i <= 9; i++) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            tile.innerText = i;
            tile.dataset.index = i;
            
            tile.addEventListener('click', () => {
                openQuestion(tile);
            });
            
            puzzleBoard.appendChild(tile);
        }

        // Open decimal problem panel for the selected tile
        function openQuestion(tile) {
            currentTile = tile;
            feedback.innerText = '';
            answerInput.value = '';
            
            // Generate random numbers with 1 decimal place (1.0 to 9.9)
            const num1 = (Math.floor(Math.random() * 90) + 10) / 10;
            const num2 = (Math.floor(Math.random() * 90) + 10) / 10;
            
            // Clean rounding for JS floating point math evaluation
            correctAnswer = parseFloat((num1 + num2).toFixed(1));

            questionText.innerText = `Square ${tile.dataset.index}: What is ${num1.toFixed(1)} + ${num2.toFixed(1)}?`;
            questionBox.style.display = 'block';
            answerInput.focus();
        }

        // Check Answer logic
        function checkAnswer() {
            const studentAnswer = parseFloat(answerInput.value);

            if (isNaN(studentAnswer)) {
                feedback.style.color = '#ffa502';
                feedback.innerText = 'Please type a decimal answer!';
                return;
            }

            // Compare answers up to 1 decimal place accuracy
            if (parseFloat(studentAnswer.toFixed(1)) === correctAnswer) {
                feedback.style.color = '#2ed573';
                feedback.innerText = 'Correct!';
                
                // Reveal the background piece
                currentTile.classList.add('revealed');
                questionBox.style.display = 'none';
                revealedCount++;

                // Check for win condition
                if (revealedCount === 9) {
                    winMessage.style.display = 'block';
                }
            } else {
                feedback.style.color = '#ff4757';
                feedback.innerText = 'Not quite! Try adding again.';
                answerInput.value = '';
                answerInput.focus();
            }
        }

        // Trigger action on button click
        submitBtn.addEventListener('click', checkAnswer);

        // Allow pressing "Enter" key to submit
        answerInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>

</body></html>
